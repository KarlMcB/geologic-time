<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geologic Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════ */
:root {
  --bg:          #050d1a;
  --ochre:       #c8882a;
  --rust:        #a84428;
  --cream:       #f5e8cc;
  --slate:       #7a8e9a;
  --gold:        #e8b830;
  --green-life:  #4a7a32;
  --blue-water:  #2a6080;
  --red-extinct: #b82820;
  --warm-stone:  #8b6040;
  --fd: 'Playfair Display', Georgia, serif;
  --fb: 'Crimson Pro', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--cream); font-family: var(--fb); overflow-x: hidden; }

/* ═══════════════════════════════════════
   STARFIELD
═══════════════════════════════════════ */
#starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite; opacity: var(--o, .5);
}
@keyframes twinkle {
  0%, 100% { opacity: var(--o, .5); }
  50%       { opacity: calc(var(--o, .5) * 0.12); }
}

/* ═══════════════════════════════════════
   ERA BACKGROUND
═══════════════════════════════════════ */
#era-bg {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none; transition: background 2.5s ease; opacity: .20;
}

/* ═══════════════════════════════════════
   TIMELINE CONTAINER (height set by JS)
═══════════════════════════════════════ */
#timeline { position: relative; width: 100%; z-index: 10; }

/* SPINE */
#spine {
  position: absolute; left: 50%; top: 0; bottom: 0; width: 3px;
  transform: translateX(-50%);
  background: linear-gradient(to bottom,
    transparent 0%, #3a2808 .3%, var(--ochre) 5%,
    var(--rust) 30%, var(--warm-stone) 60%,
    var(--green-life) 85%, var(--gold) 99%, transparent 100%);
  opacity: .65;
}

/* SPINE DOTS */
.spine-dot {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid; background: var(--bg); z-index: 20;
}

/* ═══════════════════════════════════════
   HERO
═══════════════════════════════════════ */
#hero {
  position: absolute; top: 0; left: 0; right: 0; height: 580px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2rem; z-index: 15;
}
#hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(200,136,42,.13) 0%, transparent 70%);
}
.hero-sub { font-size: .9rem; letter-spacing: .38em; text-transform: uppercase; color: var(--ochre); margin-bottom: 1.2rem; }
.hero-title {
  font-family: var(--fd); font-size: clamp(3rem, 8vw, 6.5rem);
  font-weight: 900; line-height: 1; color: var(--cream);
  text-shadow: 0 0 80px rgba(200,136,42,.35);
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-desc {
  font-size: 1.1rem; font-weight: 300; color: rgba(245,232,204,.72);
  max-width: 540px; line-height: 1.75; margin: 1.4rem auto 0;
}
.hero-scale {
  margin-top: 1.8rem; padding: .55rem 1.5rem;
  border: 1px solid rgba(200,136,42,.35); border-radius: 2px;
  font-size: .82rem; letter-spacing: .12em; color: var(--ochre);
}
.scroll-cue {
  position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: .5rem;
  color: rgba(245,232,204,.42); font-size: .72rem;
  letter-spacing: .22em; text-transform: uppercase;
  animation: bounce 2.5s ease-in-out infinite;
}
.scroll-cue::after {
  content: ''; width: 1px; height: 44px;
  background: linear-gradient(to bottom, rgba(200,136,42,.55), transparent);
}
@keyframes bounce {
  0%, 100% { opacity: .42; transform: translateX(-50%) translateY(0); }
  50%       { opacity: 1;   transform: translateX(-50%) translateY(7px); }
}

/* ═══════════════════════════════════════
   EVENT CARDS
═══════════════════════════════════════ */
.event { position: absolute; left: 50%; width: 400px; z-index: 15; }
.event.left  { transform: translateX(calc(-100% - 36px)); }
.event.right { transform: translateX(36px); }

.event-inner {
  background: linear-gradient(135deg, rgba(20,10,2,.97) 0%, rgba(38,18,6,.93) 100%);
  border: 1px solid; border-radius: 3px;
  padding: 1.25rem 1.5rem 1.1rem; position: relative;
  backdrop-filter: blur(6px);
  opacity: 0; transform: translateX(-28px);
  transition: opacity .65s ease, transform .65s ease;
}
.event.right .event-inner { transform: translateX(28px); }
.event.visible .event-inner { opacity: 1 !important; transform: translateX(0) !important; }
.event.visible .event-inner:hover {
  box-shadow: 0 10px 48px rgba(0,0,0,.65);
  transform: translateY(-2px) !important;
}

/* Connector */
.event-conn { position: absolute; top: 50%; height: 1px; opacity: .45; pointer-events: none; }
.event.left  .event-conn { right: -36px; width: 36px; background: linear-gradient(to right, currentColor, transparent); }
.event.right .event-conn { left:  -36px; width: 36px; background: linear-gradient(to left,  currentColor, transparent); }

/* Number badge */
.event-badge {
  position: absolute; top: -12px; font-size: .65rem; font-weight: 700;
  letter-spacing: .15em; padding: 2px 10px; border-radius: 2px;
  text-transform: uppercase; font-family: var(--fb);
}
.event.left  .event-badge { right: 1rem; }
.event.right .event-badge { left:  1rem; }

/* Number circle */
.event-num {
  position: absolute; top: 50%;
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fd); font-size: .95rem; font-weight: 900;
  color: #0a0a0a; transform: translateY(-50%);
}
.event.left  .event-num { right: -55px; }
.event.right .event-num { left:  -55px; }

.event-name {
  font-family: var(--fd); font-size: 1.08rem; font-weight: 700;
  line-height: 1.25; margin-bottom: .38rem; color: var(--cream);
}
.event-age  { font-size: .84rem; font-weight: 600; letter-spacing: .06em; margin-bottom: .22rem; }
.event-feet { font-size: .72rem; color: rgba(245,232,204,.42); letter-spacing: .08em; margin-bottom: .18rem; }
.event-feet strong { color: var(--gold); font-weight: 600; }
.event-note { font-size: .75rem; font-style: italic; color: rgba(245,232,204,.55); margin-top: .25rem; line-height: 1.4; }

/* ═══════════════════════════════════════
   CATEGORY THEMES
═══════════════════════════════════════ */
.cat-geo   { border-color: rgba(122,142,154,.28); }
.cat-life  { border-color: rgba(74,122,50,.28);   }
.cat-water { border-color: rgba(42,96,128,.28);   }
.cat-ext   { border-color: rgba(184,40,32,.38);   }
.cat-human { border-color: rgba(232,184,48,.38);  }
.cat-era   { border-color: rgba(200,136,42,.38);  }

.cat-geo   .event-badge { background: rgba(122,142,154,.18); color: var(--slate);       }
.cat-life  .event-badge { background: rgba(74,122,50,.18);   color: var(--green-life);  }
.cat-water .event-badge { background: rgba(42,96,128,.18);   color: var(--blue-water);  }
.cat-ext   .event-badge { background: rgba(184,40,32,.20);   color: var(--red-extinct); }
.cat-human .event-badge { background: rgba(232,184,48,.18);  color: var(--gold);        }
.cat-era   .event-badge { background: rgba(200,136,42,.18);  color: var(--ochre);       }

.cat-geo   .event-num { background: var(--slate);       }
.cat-life  .event-num { background: var(--green-life);  }
.cat-water .event-num { background: var(--blue-water);  }
.cat-ext   .event-num { background: var(--red-extinct); }
.cat-human .event-num { background: var(--gold);        }
.cat-era   .event-num { background: var(--ochre);       }

.cat-geo   .event-age, .cat-geo   .event-conn { color: var(--slate);       }
.cat-life  .event-age, .cat-life  .event-conn { color: var(--green-life);  }
.cat-water .event-age, .cat-water .event-conn { color: var(--blue-water);  }
.cat-ext   .event-age, .cat-ext   .event-conn { color: var(--red-extinct); }
.cat-human .event-age, .cat-human .event-conn { color: var(--gold);        }
.cat-era   .event-age, .cat-era   .event-conn { color: var(--ochre);       }

.cat-geo   .spine-dot { border-color: var(--slate);       }
.cat-life  .spine-dot { border-color: var(--green-life);  }
.cat-water .spine-dot { border-color: var(--blue-water);  }
.cat-ext   .spine-dot { border-color: var(--red-extinct); }
.cat-human .spine-dot { border-color: var(--gold);        }
.cat-era   .spine-dot { border-color: var(--ochre);       }

.cat-ext .event-inner::before {
  content: ''; position: absolute; inset: 0; border-radius: 3px;
  background: rgba(184,40,32,.05); pointer-events: none;
}

/* ═══════════════════════════════════════
   EON BANNERS
═══════════════════════════════════════ */
.eon-banner {
  position: absolute; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 1.8rem; padding: .5rem 2rem; z-index: 12; pointer-events: none;
}
.eon-banner::before, .eon-banner::after {
  content: ''; flex: 1; height: 1px; background: currentColor; opacity: .18;
}
.eon-label {
  font-family: var(--fd); font-size: .68rem; font-weight: 700;
  letter-spacing: .42em; text-transform: uppercase; white-space: nowrap;
}

/* ═══════════════════════════════════════
   QUIET NOTES
═══════════════════════════════════════ */
.quiet-note {
  position: absolute; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 12; pointer-events: none; width: 500px;
}
.quiet-note p {
  font-family: var(--fd); font-style: italic; font-size: .95rem;
  color: rgba(245,232,204,.2); letter-spacing: .08em; line-height: 2.0;
}

/* ═══════════════════════════════════════
   ERA BANDS
═══════════════════════════════════════ */
.era-band { position: absolute; left: 0; right: 0; pointer-events: none; z-index: 2; }

/* ═══════════════════════════════════════
   FIXED HUD
═══════════════════════════════════════ */
#hud {
  position: fixed; right: 1.5rem; top: 50%; transform: translateY(-50%);
  z-index: 100; display: flex; flex-direction: column; align-items: flex-end; gap: .75rem;
}
#era-label {
  font-family: var(--fd); font-size: .72rem; font-weight: 700;
  color: var(--ochre); text-align: right; max-width: 130px; line-height: 1.3;
}
#feet-counter {
  font-family: var(--fd); font-size: 1.5rem; font-weight: 900;
  color: var(--cream); text-align: right; line-height: 1;
}
#feet-unit { font-size: .62rem; color: rgba(245,232,204,.36); letter-spacing: .14em; text-align: right; }
#progress-track {
  width: 3px; height: 200px; background: rgba(245,232,204,.08);
  border-radius: 2px; position: relative;
}
#progress-fill {
  position: absolute; top: 0; left: 0; right: 0;
  background: linear-gradient(to bottom, var(--ochre), var(--gold));
  border-radius: 2px; height: 0%; transition: height .12s;
}
#progress-label { font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(245,232,204,.36); text-align: right; }

/* ═══════════════════════════════════════
   LEGEND
═══════════════════════════════════════ */
#legend {
  position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 100;
  background: rgba(5,13,26,.88); border: 1px solid rgba(200,136,42,.18);
  border-radius: 3px; padding: .85rem 1.1rem; backdrop-filter: blur(10px);
}
#legend h3 {
  font-family: var(--fd); font-size: .62rem; font-weight: 700;
  letter-spacing: .28em; text-transform: uppercase; color: var(--ochre); margin-bottom: .6rem;
}
.li  { display: flex; align-items: center; gap: .5rem; font-size: .7rem; color: rgba(245,232,204,.65); margin-bottom: .28rem; }
.ld  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ═══════════════════════════════════════
   PRESENT DAY
═══════════════════════════════════════ */
#present-day {
  position: absolute; bottom: 0; left: 0; right: 0; height: 600px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; z-index: 15; padding: 2rem;
}
#present-day::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(74,122,50,.14) 0%, transparent 70%);
}
.present-title {
  font-family: var(--fd); font-size: 3rem; font-weight: 900;
  color: var(--gold); margin-bottom: .5rem; position: relative;
}
.present-sub {
  font-size: 1.05rem; color: rgba(245,232,204,.58);
  max-width: 480px; line-height: 1.75; position: relative;
}
.present-stats {
  display: flex; gap: 2.5rem; justify-content: center;
  flex-wrap: wrap; margin-top: 2.2rem; position: relative;
}
.stat-num   { font-family: var(--fd); font-size: 2.2rem; font-weight: 900; line-height: 1; }
.stat-label { font-size: .68rem; letter-spacing: .22em; color: rgba(245,232,204,.42); text-transform: uppercase; margin-top: .25rem; }
</style>
</head>
<body>

<div id="starfield"></div>
<div id="era-bg"></div>

<!-- HUD -->
<div id="hud">
  <div id="era-label">Loading…</div>
  <div id="feet-counter">0.00</div>
  <div id="feet-unit">feet · — total</div>
  <div id="progress-track"><div id="progress-fill"></div></div>
  <div id="progress-label">scroll progress</div>
</div>

<!-- Legend -->
<div id="legend">
  <h3>Legend</h3>
  <div class="li"><div class="ld" style="background:var(--slate)"></div>Geological Event</div>
  <div class="li"><div class="ld" style="background:var(--green-life)"></div>First Life / Biology</div>
  <div class="li"><div class="ld" style="background:var(--blue-water)"></div>Ocean / Water</div>
  <div class="li"><div class="ld" style="background:var(--red-extinct)"></div>Mass Extinction</div>
  <div class="li"><div class="ld" style="background:var(--ochre)"></div>Era Boundary</div>
  <div class="li"><div class="ld" style="background:var(--gold)"></div>Human Ancestors</div>
</div>

<!-- Timeline (populated by JS) -->
<div id="timeline"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   CSV PARSER
   Handles quoted fields and comma-within-quotes correctly.
═══════════════════════════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"' && !inQ) { inQ = true; continue; }
    if (ch === '"' &&  inQ) { inQ = false; continue; }
    if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += ch;
  }
  result.push(cur);
  return result;
}

/* ═══════════════════════════════════════════════════════════
   FETCH ALL THREE CSVs IN PARALLEL
═══════════════════════════════════════════════════════════ */
async function loadAll() {
  const [cfgText, evText, annText] = await Promise.all([
    fetch('config.csv').then(r => r.text()),
    fetch('events.csv').then(r => r.text()),
    fetch('annotations.csv').then(r => r.text()),
  ]);

  // Config → simple key/value map
  const cfgRows = parseCSV(cfgText);
  const cfg = {};
  cfgRows.forEach(row => { cfg[row.key] = row.value; });

  const events      = parseCSV(evText);
  const annotations = parseCSV(annText);

  buildTimeline(cfg, events, annotations);
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
const TOTAL_YEARS_DEFAULT = 4600000000;

function yearsToPx(ageYears, totalYears, pageHeightPx) {
  // top = 0 means oldest; bottom means present
  // position = (totalYears - ageYears) / totalYears * pageHeightPx
  return (totalYears - ageYears) / totalYears * pageHeightPx;
}

function formatAge(years) {
  years = Number(years);
  if (years >= 1e9)        return (years / 1e9).toFixed(1).replace(/\.0$/, '') + ' billion years ago';
  if (years >= 1e6)        return Math.round(years / 1e6) + ' million years ago';
  if (years >= 1000)       return (years / 1000).toLocaleString() + ' thousand years ago';
  return years.toLocaleString() + ' years ago';
}

function formatFeet(ageYears, totalYears, totalFeet) {
  const feet = (totalYears - ageYears) / totalYears * totalFeet;
  return feet.toFixed(2) + ' ft';
}

const CAT_LABELS = {
  geo:   'Geological',
  life:  'First Life',
  water: 'Ocean Life',
  ext:   '⚠ Mass Extinction',
  era:   'Era Boundary',
  human: 'Human Ancestors',
};

/* ═══════════════════════════════════════════════════════════
   STARFIELD
═══════════════════════════════════════════════════════════ */
function buildStarfield() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 220; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.2 + 0.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--o:${(Math.random()*.45+.15).toFixed(2)};--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;
    sf.appendChild(s);
  }
}

/* ═══════════════════════════════════════════════════════════
   BUILD TIMELINE
═══════════════════════════════════════════════════════════ */
function buildTimeline(cfg, events, annotations) {
  const totalYears   = Number(cfg.total_years)    || TOTAL_YEARS_DEFAULT;
  const totalFeet    = Number(cfg.total_feet)      || 120;
  const pageHeightPx = Number(cfg.page_height_px)  || 360000;
  const title        = cfg.title                   || 'Geologic Time';
  const subtitle     = cfg.subtitle                || '';
  const scaleLabel   = cfg.scale_label             || '';
  const HERO_H       = 580;  // hero section height px
  const FOOTER_H     = 600;  // present-day section height px
  const totalPageH   = pageHeightPx + HERO_H + FOOTER_H;
  const pxPerYear    = pageHeightPx / totalYears;

  // Update HUD units label
  document.getElementById('feet-unit').textContent = `feet · ${totalFeet} total`;

  // Helper: age → absolute px position on page
  function ageToPx(ageYears) {
    return HERO_H + yearsToPx(ageYears, totalYears, pageHeightPx);
  }

  // ── Build DOM ────────────────────────────────────────────
  const tl = document.getElementById('timeline');
  tl.style.height = totalPageH + 'px';
  tl.innerHTML = '';   // clear any previous render

  // Spine
  const spine = document.createElement('div');
  spine.id = 'spine';
  tl.appendChild(spine);

  // ── HERO ────────────────────────────────────────────────
  const pxPerFt = pageHeightPx / totalFeet;
  const hero = document.createElement('div');
  hero.id = 'hero';
  hero.innerHTML = `
    <div class="hero-sub">${subtitle}</div>
    <h1 class="hero-title">${title.replace(' ', '<br><em>')}${title.includes(' ') ? '</em>' : ''}</h1>
    <p class="hero-desc">
      This page is ${pageHeightPx.toLocaleString()} pixels tall — the equivalent of scrolling
      ${totalFeet} feet. Every pixel represents roughly
      ${Math.round(totalYears / pageHeightPx).toLocaleString()} years of Earth's history.
      Scroll down through deep time.
    </p>
    <div class="hero-scale">${scaleLabel} &nbsp;·&nbsp; 1 px ≈ ${Math.round(pxPerYear < 1 ? 1/pxPerYear : 1).toLocaleString()} ${pxPerYear >= 1 ? 'px/yr' : 'yrs/px'} &nbsp;·&nbsp; ${events.length} events</div>
    <div class="scroll-cue">Scroll to begin</div>
  `;
  tl.appendChild(hero);

  // ── ERA BACKGROUND BANDS ─────────────────────────────────
  // Hardcoded eon boundaries (standard geology)
  const eons = [
    { start: 4600000000, end: 4000000000, bg: 'rgba(26,8,0,0),rgba(35,14,2,.30)' },
    { start: 4000000000, end: 2500000000, bg: 'rgba(40,20,6,.26),rgba(52,26,8,.36)' },
    { start: 2500000000, end: 541000000,  bg: 'rgba(55,28,10,.33),rgba(68,36,14,.40)' },
    { start: 541000000,  end: 0,          bg: 'rgba(28,42,8,.30),rgba(18,38,6,.40)' },
  ];
  eons.forEach(eon => {
    const topPx    = ageToPx(eon.start);
    const bottomPx = ageToPx(eon.end);
    const heightPx = Math.max(0, bottomPx - topPx);
    if (heightPx <= 0) return;
    const band = document.createElement('div');
    band.className = 'era-band';
    band.style.cssText = `top:${topPx}px;height:${heightPx}px;background:linear-gradient(to bottom,${eon.bg})`;
    tl.appendChild(band);
  });

  // ── ANNOTATIONS (banners + quiet notes) ─────────────────
  annotations.forEach(ann => {
    const topPx = ageToPx(Number(ann.age_years));
    const color = ann.color || (ann.type === 'quiet_note' ? 'rgba(245,232,204,.2)' : 'rgba(200,136,42,.5)');

    if (ann.type === 'eon_banner') {
      const el = document.createElement('div');
      el.className = 'eon-banner';
      el.style.cssText = `top:${topPx}px;color:${color}`;
      el.innerHTML = `<span class="eon-label" style="color:${color}">${ann.text}</span>`;
      tl.appendChild(el);

    } else if (ann.type === 'quiet_note') {
      const el = document.createElement('div');
      el.className = 'quiet-note';
      el.style.top = topPx + 'px';
      const lines = ann.text.split('|').map(l => `<p>${l.trim()}</p>`).join('');
      el.innerHTML = lines;
      if (ann.color) el.style.color = ann.color;
      tl.appendChild(el);
    }
  });

  // ── EVENTS ───────────────────────────────────────────────
  events.forEach((ev, idx) => {
    const num    = idx + 1;
    const side   = idx % 2 === 0 ? 'left' : 'right';
    const topPx  = ageToPx(Number(ev.age_years));
    const cat    = ev.category || 'geo';
    const feet   = formatFeet(ev.age_years, totalYears, totalFeet);
    const age    = formatAge(ev.age_years);
    const label  = CAT_LABELS[cat] || cat;

    // Card
    const card = document.createElement('div');
    card.className = `event ${side} cat-${cat}`;
    card.style.top = topPx + 'px';
    card.id = `ev-${num}`;

    const noteHTML = ev.card_note
      ? `<div class="event-note">${ev.card_note}</div>`
      : '';

    card.innerHTML = `
      <div class="event-inner">
        <div class="event-conn"></div>
        <div class="event-badge">${label}</div>
        <div class="event-num">${num}</div>
        <div class="event-name">${ev.name}</div>
        <div class="event-age">${age}</div>
        <div class="event-feet"><strong>${feet}</strong> from start</div>
        ${noteHTML}
      </div>
    `;
    tl.appendChild(card);

    // Spine dot
    const dot = document.createElement('div');
    dot.className = `spine-dot cat-${cat}`;
    dot.style.top = (topPx + 18) + 'px';
    tl.appendChild(dot);
  });

  // ── PRESENT DAY ──────────────────────────────────────────
  const extCount = events.filter(e => e.category === 'ext').length;
  const pd = document.createElement('div');
  pd.id = 'present-day';
  pd.innerHTML = `
    <div style="font-size:.78rem;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;opacity:.75;position:relative">End of the Journey</div>
    <div class="present-title">Present Day</div>
    <p class="present-sub">You have scrolled ${totalFeet} feet — ${formatAge(0).replace(' ago','')} of Earth's history. All of recorded human civilization fits within the last 0.003 inches of this hallway.</p>
    <div class="present-stats">
      <div class="stat-item"><div class="stat-num" style="color:var(--gold)">${totalFeet}</div><div class="stat-label">Feet scrolled</div></div>
      <div class="stat-item"><div class="stat-num" style="color:var(--ochre)">${(totalYears/1e9).toFixed(1)}B</div><div class="stat-label">Years of history</div></div>
      <div class="stat-item"><div class="stat-num" style="color:var(--green-life)">${events.length}</div><div class="stat-label">Events</div></div>
      <div class="stat-item"><div class="stat-num" style="color:var(--slate)">${extCount}</div><div class="stat-label">Mass extinctions</div></div>
    </div>
  `;
  tl.appendChild(pd);

  // ── SCROLL HANDLER ───────────────────────────────────────
  const ERAS_HUD = [
    [0,    14.6,  'Hadean Eon',      'radial-gradient(ellipse at center top,rgba(70,20,0,.65) 0%,transparent 80%)'],
    [14.6, 67.9,  'Archean Eon',     'radial-gradient(ellipse at center top,rgba(90,38,6,.55) 0%,transparent 80%)'],
    [67.9, 109.9, 'Proterozoic Eon', 'radial-gradient(ellipse at center top,rgba(110,55,18,.45) 0%,transparent 80%)'],
    [109.9,120.0, 'Phanerozoic Eon', 'radial-gradient(ellipse at center top,rgba(32,68,12,.48) 0%,transparent 80%)'],
  ];
  function getEraHUD(ft) { return ERAS_HUD.find(e => ft >= e[0] && ft <= e[1]) || ERAS_HUD[3]; }

  const pf = document.getElementById('progress-fill');
  const fc = document.getElementById('feet-counter');
  const el = document.getElementById('era-label');
  const eb = document.getElementById('era-bg');
  let lastEra = '';

  // IntersectionObserver for card slide-in
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.event').forEach(ev => obs.observe(ev));

  function onScroll() {
    const sy   = window.scrollY;
    const max  = document.documentElement.scrollHeight - window.innerHeight;
    const prog = Math.min(Math.max(sy / max, 0), 1);
    const ft   = prog * totalFeet;
    pf.style.height = (prog * 100) + '%';
    fc.textContent  = ft.toFixed(2);
    const era = getEraHUD(ft);
    if (era[2] !== lastEra) { lastEra = era[2]; el.textContent = era[2]; eb.style.background = era[3]; }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

/* ═══════════════════════════════════════════════════════════
   KEYBOARD NAV
═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Home') window.scrollTo({ top: 0, behavior: 'smooth' });
  if (e.key === 'End')  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
});

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
buildStarfield();
loadAll().catch(err => {
  document.getElementById('era-label').textContent = 'Error loading CSVs';
  console.error('Failed to load timeline data:', err);
});
</script>
</body>
</html>
